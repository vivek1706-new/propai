<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Property Listings – NestFinder</title>
    <meta name="description" content="Browse properties for sale and rent across India with advanced filters." />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="listings-page">

    <!-- ── NAVBAR ─────────────────────────────────────────────────── -->
    <nav class="navbar" id="main-navbar">
        <a href="index.html" class="navbar-logo">Nest<span>Finder</span></a>
        <div class="navbar-links">
            <a href="listings.html?type=buy" class="nav-link">Buy</a>
            <a href="listings.html?type=rent" class="nav-link">Rent</a>
            <a href="#" class="nav-link">Projects</a>
            <a href="#" class="nav-link">Commercial</a>
        </div>
        <div class="navbar-actions">
            <a href="contacts.html" class="btn-login-desktop">📋 Contacts</a>
            <a href="#" class="btn-post-desktop">Post Property Free</a>
        </div>
        <button class="navbar-search-icon" onclick="openFilterPanel()" aria-label="Filter">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <line x1="4" y1="6" x2="20" y2="6" />
                <line x1="8" y1="12" x2="16" y2="12" />
                <line x1="11" y1="18" x2="13" y2="18" />
            </svg>
        </button>
        <a href="contacts.html" class="navbar-menu-icon" aria-label="Contacts">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </a>
    </nav>

    <!-- ── FILTER CHIPS BAR ────────────────────────────────────────── -->
    <div class="filter-chips-bar">
        <div class="filter-chips-scroll" id="chips-row">
            <!-- Type chips -->
            <button class="filter-chip active" data-filter="type" data-value="all"
                onclick="setChip(this,'type','all')">All</button>
            <button class="filter-chip" data-filter="type" data-value="buy"
                onclick="setChip(this,'type','buy')">Buy</button>
            <button class="filter-chip" data-filter="type" data-value="rent"
                onclick="setChip(this,'type','rent')">Rent</button>
            <!-- BHK chips -->
            <button class="filter-chip" data-filter="bhk" data-value="1" onclick="toggleBhkChip(this,1)">1 BHK</button>
            <button class="filter-chip" data-filter="bhk" data-value="2" onclick="toggleBhkChip(this,2)">2 BHK</button>
            <button class="filter-chip" data-filter="bhk" data-value="3" onclick="toggleBhkChip(this,3)">3 BHK</button>
            <button class="filter-chip" data-filter="bhk" data-value="4" onclick="toggleBhkChip(this,4)">4+ BHK</button>
            <!-- More filters -->
            <button class="filter-chip" onclick="openFilterPanel()">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <line x1="4" y1="6" x2="20" y2="6" />
                    <line x1="8" y1="12" x2="16" y2="12" />
                    <line x1="11" y1="18" x2="13" y2="18" />
                </svg>
                More Filters
            </button>
        </div>
    </div>

    <!-- ── MOBILE FILTER PANEL (bottom sheet) ─────────────────────── -->
    <div class="filter-panel-overlay" id="filter-panel-overlay" onclick="handlePanelOverlay(event)">
        <div class="filter-panel" id="filter-panel">
            <div class="filter-panel-header">
                <h3>Filters</h3>
                <button class="fp-close-btn" onclick="closeFilterPanel()">✕</button>
            </div>

            <!-- Looking For -->
            <div class="filter-section">
                <div class="filter-title">Looking For</div>
                <div class="pill-group" id="fp-type">
                    <button class="pill active" data-v="all" onclick="fpPill(this,'type')">All</button>
                    <button class="pill" data-v="buy" onclick="fpPill(this,'type')">Buy</button>
                    <button class="pill" data-v="rent" onclick="fpPill(this,'type')">Rent</button>
                </div>
            </div>

            <!-- BHK -->
            <div class="filter-section">
                <div class="filter-title">BHK Type</div>
                <div class="pill-group" id="fp-bhk">
                    <button class="pill" data-v="1" onclick="fpBhk(this)">1 BHK</button>
                    <button class="pill" data-v="2" onclick="fpBhk(this)">2 BHK</button>
                    <button class="pill" data-v="3" onclick="fpBhk(this)">3 BHK</button>
                    <button class="pill" data-v="4" onclick="fpBhk(this)">4+ BHK</button>
                </div>
            </div>

            <!-- Budget -->
            <div class="filter-section">
                <div class="filter-title">Budget</div>
                <div class="budget-display">
                    Up to <span id="fp-budget-display">10 Cr+</span>
                </div>
                <input type="range" class="range-slider" id="fp-budget-range" min="0" max="100000000" step="500000"
                    value="100000000" oninput="fpBudgetUpdate(this.value)" />
                <div class="budget-presets">
                    <button class="preset-btn" onclick="setFpBudget(5000000)">Under 50L</button>
                    <button class="preset-btn" onclick="setFpBudget(10000000)">Under 1Cr</button>
                    <button class="preset-btn" onclick="setFpBudget(25000000)">Under 2.5Cr</button>
                    <button class="preset-btn" onclick="setFpBudget(100000000)">All</button>
                </div>
            </div>

            <!-- Property Type -->
            <div class="filter-section">
                <div class="filter-title">Property Type</div>
                <div class="pill-group" id="fp-proptype">
                    <button class="pill active" data-v="all" onclick="fpPill(this,'proptype')">All</button>
                    <button class="pill" data-v="Flat" onclick="fpPill(this,'proptype')">Flat</button>
                    <button class="pill" data-v="Villa" onclick="fpPill(this,'proptype')">Villa</button>
                    <button class="pill" data-v="Plot" onclick="fpPill(this,'proptype')">Plot</button>
                </div>
            </div>

            <!-- Locality -->
            <div class="filter-section">
                <div class="filter-title">Locality</div>
                <div class="locality-filter">
                    <label class="checkbox-item"><input type="checkbox" value="Bandra" onchange="fpLocality()" />
                        Bandra, Mumbai</label>
                    <label class="checkbox-item"><input type="checkbox" value="Powai" onchange="fpLocality()" /> Powai,
                        Mumbai</label>
                    <label class="checkbox-item"><input type="checkbox" value="Andheri" onchange="fpLocality()" />
                        Andheri, Mumbai</label>
                    <label class="checkbox-item"><input type="checkbox" value="Whitefield" onchange="fpLocality()" />
                        Whitefield, Bengaluru</label>
                    <label class="checkbox-item"><input type="checkbox" value="Indiranagar" onchange="fpLocality()" />
                        Indiranagar, Bengaluru</label>
                    <label class="checkbox-item"><input type="checkbox" value="Koramangala" onchange="fpLocality()" />
                        Koramangala, Bengaluru</label>
                    <label class="checkbox-item"><input type="checkbox" value="Hitech City" onchange="fpLocality()" />
                        Hitech City, Hyderabad</label>
                    <label class="checkbox-item"><input type="checkbox" value="Gurgaon" onchange="fpLocality()" />
                        Gurgaon, Delhi NCR</label>
                </div>
            </div>

            <!-- Furnishing -->
            <div class="filter-section">
                <div class="filter-title">Furnishing</div>
                <div class="pill-group" id="fp-furnish">
                    <button class="pill active" data-v="all" onclick="fpPill(this,'furnish')">All</button>
                    <button class="pill" data-v="Furnished" onclick="fpPill(this,'furnish')">Furnished</button>
                    <button class="pill" data-v="Semi-Furnished"
                        onclick="fpPill(this,'furnish')">Semi-Furnished</button>
                    <button class="pill" data-v="Unfurnished" onclick="fpPill(this,'furnish')">Unfurnished</button>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="filter-panel-actions">
                <button class="fp-clear-btn" onclick="clearAllFilters()">Clear All</button>
                <button class="fp-apply-btn" onclick="applyFilters(); closeFilterPanel()">Apply Filters</button>
            </div>
        </div>
    </div>

    <!-- ── DESKTOP SIDEBAR + MAIN ──────────────────────────────────── -->
    <div class="listings-layout" id="listings-layout" style="display:none">
        <!-- Desktop sidebar reuses filter panel sections — rendered by JS -->
    </div>

    <!-- ── LISTINGS MAIN (mobile layout) ──────────────────────────── -->
    <div class="listings-content" id="listings-content">
        <div class="sort-bar">
            <div class="results-info">
                <span id="result-count">—</span> properties found
            </div>
            <div class="sort-controls">
                <span class="sort-label">Sort:</span>
                <select class="sort-select" id="sort-select" onchange="applyFilters()">
                    <option value="featured">Featured</option>
                    <option value="price-asc">Price ↑</option>
                    <option value="price-desc">Price ↓</option>
                    <option value="newest">Newest</option>
                    <option value="area-desc">Largest</option>
                </select>
            </div>
        </div>
        <div class="active-filters" id="active-filters"></div>
        <div class="cards-grid" id="listings-grid"></div>
        <div class="empty-state" id="empty-state" style="display:none">
            <div class="empty-icon">🏚️</div>
            <h3>No properties found</h3>
            <p>Try adjusting your filters to broaden your search</p>
        </div>
    </div>

    <!-- ── BOTTOM NAV ─────────────────────────────────────────────── -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Home
        </a>
        <a href="listings.html?type=buy" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
            Buy
        </a>
        <a href="listings.html?type=rent" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
            Rent
        </a>
        <a href="contacts.html" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Contacts
        </a>
        <a href="#" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="1" />
                <circle cx="19" cy="12" r="1" />
                <circle cx="5" cy="12" r="1" />
            </svg>
            More
        </a>
    </nav>

    <script src="app.js"></script>
    <script>
        // ── Filter state ───────────────────────────────────────────────
        const state = {
            type: 'all', bhk: [], budget: 100000000,
            proptype: 'all', localities: [], furnish: 'all', sort: 'featured'
        };

        // ── URL param init ─────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            const p = new URLSearchParams(location.search);
            if (p.get('type')) state.type = p.get('type');
            if (p.get('bhk')) state.bhk = [parseInt(p.get('bhk'))];
            if (p.get('locality')) state.localities = [p.get('locality')];

            // Activate chips from URL
            if (state.type !== 'all') {
                document.querySelectorAll(`[data-filter="type"]`).forEach(c => c.classList.remove('active'));
                const c = document.querySelector(`[data-filter="type"][data-value="${state.type}"]`);
                if (c) c.classList.add('active');
            }
            state.bhk.forEach(b => {
                const chip = document.querySelector(`[data-filter="bhk"][data-value="${b}"]`);
                if (chip) chip.classList.add('active');
            });

            applyFilters();
        });

        // ── Chip helpers ───────────────────────────────────────────────
        function setChip(btn, filter, val) {
            document.querySelectorAll(`[data-filter="${filter}"]`).forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            state[filter] = val;
            applyFilters();
        }
        function toggleBhkChip(btn, val) {
            btn.classList.toggle('active');
            if (btn.classList.contains('active')) {
                state.bhk.push(val);
            } else {
                state.bhk = state.bhk.filter(b => b !== val);
            }
            applyFilters();
        }

        // ── Filter panel helpers ───────────────────────────────────────
        function fpPill(btn, group) {
            document.querySelectorAll(`#fp-${group} .pill`).forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
        }
        function fpBhk(btn) { btn.classList.toggle('active'); }
        function fpLocality() { }
        function fpBudgetUpdate(val) {
            const v = parseInt(val);
            const label = v >= 100000000 ? '10 Cr+' : v >= 10000000 ? `${(v / 10000000).toFixed(1)} Cr` : `${Math.round(v / 100000)} L`;
            document.getElementById('fp-budget-display').textContent = label;
        }
        function setFpBudget(val) {
            document.getElementById('fp-budget-range').value = val;
            fpBudgetUpdate(val);
        }
        function applyFilters() {
            // Sync from panel state
            const typeEl = document.querySelector('#fp-type .pill.active');
            if (typeEl) {
                state.type = typeEl.dataset.v;
                // Sync chips
                document.querySelectorAll('[data-filter="type"]').forEach(c => {
                    c.classList.toggle('active', c.dataset.value === state.type);
                });
            }
            const bhkActive = [...document.querySelectorAll('#fp-bhk .pill.active')].map(b => parseInt(b.dataset.v));
            if (bhkActive.length) state.bhk = bhkActive;

            const proptypeEl = document.querySelector('#fp-proptype .pill.active');
            if (proptypeEl) state.proptype = proptypeEl.dataset.v;

            const furnishEl = document.querySelector('#fp-furnish .pill.active');
            if (furnishEl) state.furnish = furnishEl.dataset.v;

            state.localities = [...document.querySelectorAll('.locality-filter input:checked')].map(i => i.value);
            state.budget = parseInt(document.getElementById('fp-budget-range').value);
            state.sort = document.getElementById('sort-select').value;

            renderListings();
        }

        // ── Open/close filter panel ────────────────────────────────────
        function openFilterPanel() {
            document.getElementById('filter-panel-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeFilterPanel() {
            document.getElementById('filter-panel-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }
        function handlePanelOverlay(e) {
            if (e.target === document.getElementById('filter-panel-overlay')) closeFilterPanel();
        }

        // ── Clear filters ──────────────────────────────────────────────
        function clearAllFilters() {
            state.type = 'all'; state.bhk = []; state.budget = 100000000;
            state.proptype = 'all'; state.localities = []; state.furnish = 'all';
            // Reset UI
            document.querySelectorAll('#fp-type .pill, #fp-proptype .pill, #fp-furnish .pill').forEach(p => {
                p.classList.toggle('active', p.dataset.v === 'all');
            });
            document.querySelectorAll('#fp-bhk .pill').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.locality-filter input').forEach(i => i.checked = false);
            document.getElementById('fp-budget-range').value = 100000000;
            fpBudgetUpdate(100000000);
            document.querySelectorAll('[data-filter]').forEach(c => {
                c.classList.toggle('active', c.dataset.value === 'all' || c.dataset.filter === 'type' && c.dataset.value === 'all');
            });
            applyFilters();
        }

        // ── Main render ────────────────────────────────────────────────
        function renderListings() {
            let list = [...properties];

            // Filter
            if (state.type !== 'all') list = list.filter(p => p.listingType === state.type);
            if (state.bhk.length) list = list.filter(p => state.bhk.some(b => b >= 4 ? p.bhk >= 4 : p.bhk === b));
            if (state.proptype !== 'all') list = list.filter(p => p.propertyType === state.proptype);
            if (state.localities.length) list = list.filter(p => state.localities.includes(p.locality));
            if (state.furnish !== 'all') list = list.filter(p => p.furnishing === state.furnish);
            list = list.filter(p => p.price <= state.budget);

            // Sort
            if (state.sort === 'price-asc') list.sort((a, b) => a.price - b.price);
            if (state.sort === 'price-desc') list.sort((a, b) => b.price - a.price);
            if (state.sort === 'newest') list.sort((a, b) => a.postedDays - b.postedDays);
            if (state.sort === 'area-desc') list.sort((a, b) => b.area - a.area);
            if (state.sort === 'featured') list.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));

            // Active tags
            const tags = [];
            if (state.type !== 'all') tags.push({ label: state.type === 'buy' ? 'For Sale' : 'For Rent', key: 'type', reset: 'all' });
            state.bhk.forEach(b => tags.push({ label: b >= 4 ? '4+ BHK' : `${b} BHK`, key: 'bhk_' + b }));
            if (state.proptype !== 'all') tags.push({ label: state.proptype, key: 'proptype', reset: 'all' });
            if (state.furnish !== 'all') tags.push({ label: state.furnish, key: 'furnish', reset: 'all' });
            state.localities.forEach(l => tags.push({ label: l, key: 'loc_' + l }));
            if (state.budget < 100000000) {
                const lbl = state.budget >= 10000000 ? `Under ₹${(state.budget / 10000000).toFixed(1)}Cr` : `Under ₹${Math.round(state.budget / 100000)}L`;
                tags.push({ label: lbl, key: 'budget' });
            }

            document.getElementById('active-filters').innerHTML = tags.map(t =>
                `<span class="active-tag">${t.label}<button onclick="removeTag('${t.key}')">×</button></span>`
            ).join('');

            // Render grid
            const grid = document.getElementById('listings-grid');
            const empty = document.getElementById('empty-state');
            document.getElementById('result-count').textContent = list.length;

            if (!list.length) {
                grid.innerHTML = '';
                empty.style.display = 'flex';
            } else {
                empty.style.display = 'none';
                grid.innerHTML = list.map(buildCard).join('');
            }
        }

        function removeTag(key) {
            if (key === 'type') { state.type = 'all'; document.querySelectorAll('#fp-type .pill').forEach(p => p.classList.toggle('active', p.dataset.v === 'all')); }
            if (key === 'proptype') { state.proptype = 'all'; document.querySelectorAll('#fp-proptype .pill').forEach(p => p.classList.toggle('active', p.dataset.v === 'all')); }
            if (key === 'furnish') { state.furnish = 'all'; document.querySelectorAll('#fp-furnish .pill').forEach(p => p.classList.toggle('active', p.dataset.v === 'all')); }
            if (key === 'budget') { state.budget = 100000000; document.getElementById('fp-budget-range').value = 100000000; fpBudgetUpdate(100000000); }
            if (key.startsWith('bhk_')) {
                const b = parseInt(key.replace('bhk_', ''));
                state.bhk = state.bhk.filter(x => x !== b);
                document.querySelectorAll('#fp-bhk .pill').forEach(p => { if (parseInt(p.dataset.v) === b) p.classList.remove('active'); });
                document.querySelectorAll('[data-filter="bhk"]').forEach(c => { if (parseInt(c.dataset.value) === b) c.classList.remove('active'); });
            }
            if (key.startsWith('loc_')) {
                const l = key.replace('loc_', '');
                state.localities = state.localities.filter(x => x !== l);
                document.querySelectorAll('.locality-filter input').forEach(i => { if (i.value === l) i.checked = false; });
            }
            applyFilters();
        }

        document.getElementById('sort-select').addEventListener('change', applyFilters);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A stunning modern Hello World webpage." />
  <title>Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="hero">
    <div class="card">
      <span class="badge">✦ Welcome</span>
      <h1 class="title">
        Hello, <span class="gradient-text">World</span>
        <span class="wave" role="img" aria-label="waving hand">👋</span>
      </h1>
      <p class="subtitle">
        A beautifully crafted starting point for something extraordinary.
      </p>
      <div class="divider"></div>
      <div class="stack-info">
        <span class="tag">HTML</span>
        <span class="tag">CSS</span>
        <span class="tag">Modern Design</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Crafted with <span class="heart">♥</span> and pure CSS</p>
  </footer>
</body>
</html>

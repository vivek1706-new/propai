<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Contacts Dashboard – NestFinder Admin</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="admin-page">

    <!-- ── NAVBAR ─────────────────────────────────────────────────── -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">Nest<span>Finder</span></a>
        <div class="navbar-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="listings.html" class="nav-link">Listings</a>
        </div>
        <div class="navbar-actions">
            <a href="listings.html" class="btn-post-desktop">View Listings</a>
        </div>
        <a href="index.html" class="navbar-menu-icon" aria-label="Home">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg>
        </a>
    </nav>

    <!-- ── ADMIN HERO ──────────────────────────────────────────────── -->
    <div class="admin-hero">
        <h1>📋 Contacts Dashboard</h1>
        <p>All buyer enquiries stored with OTP verification status</p>
    </div>

    <!-- ── ADMIN CONTENT ──────────────────────────────────────────── -->
    <div class="admin-content">

        <!-- Stats -->
        <div class="admin-stats">
            <div class="admin-stat-card">
                <span class="stat-num" id="stat-total">0</span>
                <span class="stat-label">Total Enquiries</span>
            </div>
            <div class="admin-stat-card">
                <span class="stat-num" id="stat-verified">0</span>
                <span class="stat-label">Verified</span>
            </div>
            <div class="admin-stat-card">
                <span class="stat-num" id="stat-pending">0</span>
                <span class="stat-label">Pending</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="admin-actions">
            <div class="admin-search">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="admin-search-input" placeholder="Search by name, phone or email…"
                    oninput="renderTable()" />
            </div>
            <button class="admin-refresh-btn" onclick="loadContacts()">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <polyline points="23 4 23 10 17 10" />
                    <polyline points="1 20 1 14 7 14" />
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                </svg>
                Refresh
            </button>
            <button class="admin-clear-btn" onclick="clearContacts()">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                </svg>
                Clear All
            </button>
            <button class="admin-export-btn" onclick="exportCSV()">
                ↓ Export CSV
            </button>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table id="contacts-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Property</th>
                        <th>OTP</th>
                        <th>Mode</th>
                        <th>Status</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="contacts-tbody">
                    <tr class="no-data-row">
                        <td colspan="9">Loading…</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- ── BOTTOM NAV ─────────────────────────────────────────────── -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Home
        </a>
        <a href="listings.html?type=buy" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
            Buy
        </a>
        <a href="listings.html?type=rent" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
            Rent
        </a>
        <a href="contacts.html" class="bottom-nav-item active">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Contacts
        </a>
        <a href="#" class="bottom-nav-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="1" />
                <circle cx="19" cy="12" r="1" />
                <circle cx="5" cy="12" r="1" />
            </svg>
            More
        </a>
    </nav>

    <script>
        const DB_KEY = 'nf_contacts';
        let allContacts = [];

        function loadContacts() {
            allContacts = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
            // Sort newest first
            allContacts.sort((a, b) => b.id - a.id);
            updateStats();
            renderTable();
        }

        function updateStats() {
            const total = allContacts.length;
            const verified = allContacts.filter(c => c.verified).length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-verified').textContent = verified;
            document.getElementById('stat-pending').textContent = total - verified;
        }

        function renderTable() {
            const q = (document.getElementById('admin-search-input').value || '').toLowerCase().trim();
            const list = q
                ? allContacts.filter(c =>
                    c.name.toLowerCase().includes(q) ||
                    c.phone.includes(q) ||
                    (c.email || '').toLowerCase().includes(q) ||
                    (c.propertyTitle || '').toLowerCase().includes(q)
                )
                : allContacts;

            const tbody = document.getElementById('contacts-tbody');
            if (!list.length) {
                tbody.innerHTML = `<tr class="no-data-row"><td colspan="9">
          ${q ? '🔍 No results for "' + q + '"' : '📭 No contacts yet. Go to listings and click "Contact Owner" to get started!'}
        </td></tr>`;
                return;
            }

            tbody.innerHTML = list.map((c, i) => {
                const time = new Date(c.timestamp);
                const timeStr = time.toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                const status = c.verified
                    ? `<span class="status-badge status-verified">✅ Verified</span>`
                    : `<span class="status-badge status-pending">⏳ Pending</span>`;
                const mode = c.mode === 'phone' ? '📞 Phone' : '✉ Contact';
                const title = (c.propertyTitle || '').length > 30 ? c.propertyTitle.slice(0, 30) + '…' : c.propertyTitle || '—';

                return `<tr>
          <td><strong>${i + 1}</strong></td>
          <td><strong>${escHtml(c.name)}</strong></td>
          <td>+91 ${escHtml(c.phone)}</td>
          <td>${escHtml(c.email || '—')}</td>
          <td title="${escHtml(c.propertyTitle || '')}">${title}</td>
          <td><span class="otp-code">${c.otp}</span></td>
          <td>${mode}</td>
          <td>${status}</td>
          <td style="color:var(--muted);font-size:0.75rem">${timeStr}</td>
        </tr>`;
            }).join('');
        }

        function escHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function clearContacts() {
            if (!confirm('Delete all contact records? This cannot be undone.')) return;
            localStorage.removeItem(DB_KEY);
            allContacts = [];
            updateStats();
            renderTable();
        }

        function exportCSV() {
            if (!allContacts.length) { alert('No contacts to export.'); return; }
            const header = ['#', 'Name', 'Phone', 'Email', 'Property', 'OTP', 'Mode', 'Verified', 'Timestamp'];
            const rows = allContacts.map((c, i) => [
                i + 1, c.name, '+91' + c.phone, c.email || '', c.propertyTitle || '',
                c.otp, c.mode, c.verified ? 'Yes' : 'No', c.timestamp
            ]);
            const csv = [header, ...rows].map(r => r.map(f => `"${String(f).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'nestfinder_contacts.csv'; a.click();
            URL.revokeObjectURL(url);
        }

        // Auto-refresh when page becomes visible (user switches back from listings)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) loadContacts();
        });

        loadContacts();
    </script>
</body>

</html>
